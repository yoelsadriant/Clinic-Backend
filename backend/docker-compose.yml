services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ibclinic
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: clinic_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic_user -d ibclinic"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATASOURCE_URL: jdbc:postgresql://db:5432/ibclinic
      DATASOURCE_USERNAME: clinic_user
      DATASOURCE_PASSWORD: clinic_pass
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-must-be-at-least-32-bytes}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
